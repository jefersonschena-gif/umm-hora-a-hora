const mkPart=()=>({partId:'',cap:'',startTime:''});
const mkCell=()=>({operators:1,extraRef:0,parts:[mkPart(),mkPart(),mkPart()]});
const mkShift=(sk,date)=>({id:Date.now(),shiftKey:sk,date,createdAt:new Date().toISOString(),
  cells:Object.fromEntries(CELLS.map(c=>[c,mkCell()])),
  reals:Object.fromEntries(CELLS.map(c=>[c,Array(8).fill('')]))});

function t2m(t,sm){if(!t||!t.includes(':'))return null;const[h,m]=t.split(':').map(Number);if(isNaN(h)||isNaN(m))return null;return((h*60+m-sm)+1440)%1440;}
function getLookup(id,cellId,catalog){const e=catalog.find(x=>x.id===String(id||'').trim());return e?(e.caps[cellId]??null):null;}

function calcMeta(cell,period,sk,catalog){
  const sh=SHIFTS[sk]; let pm=period.pm;
  if(period.refCont&&Number(cell.extraRef)>0)pm=Math.max(0,pm-Number(cell.extraRef));
  const dur=period.e-period.s; if(!dur)return 0;
  let total=0;
  for(let i=0;i<3;i++){
    const p=cell.parts?.[i]; const cap=Number(p?.cap); if(!cap)continue;
    let ps=i===0?(t2m(p.startTime,sh.startMin)??0):t2m(p.startTime,sh.startMin);
    if(ps===null)continue;
    let pe=sh.totalMins;
    for(let j=i+1;j<3;j++){const np=cell.parts?.[j];if(np?.startTime){const nm=t2m(np.startTime,sh.startMin);if(nm!==null){pe=nm;break;}}}
    total+=cap*(Math.max(0,Math.min(pe,period.e)-Math.max(ps,period.s))/dur)*pm/60;
  }
  return Math.round(total);
}
function allMetas(shift,catalog){const sh=SHIFTS[shift.shiftKey];return Object.fromEntries(CELLS.map(c=>[c,sh.periods.map(p=>calcMeta(shift.cells[c]||mkCell(),p,shift.shiftKey,catalog))]));}
function eficTotal(cid,metas,reals){let rs=0,ms=0;for(let i=0;i<8;i++){const m=(metas[cid]||[])[i]||0,r=(reals[cid]||[])[i];if(r!==''&&r!==null&&r!==undefined&&m>0){rs+=Number(r);ms+=m;}}return ms>0?rs/ms:null;}
function capH(cid,metas,sk){const sh=SHIFTS[sk],ms=metas[cid]||[];let mt=0,mint=0;sh.periods.forEach((p,i)=>{if((ms[i]||0)>0){mt+=ms[i];mint+=p.pm;}});return mint>0?Math.round(mt*60/mint):0;}

function App(){

  const[history,setHistory]=useState([]);
  const[catalog,setCatalog]=useState(CATALOG_BASE);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{(async()=>{
    try{
      const s=await storage.get('hah2_shift'); if(s)setShift(JSON.parse(s.value));
      const h=await storage.get('hah2_hist');  if(h)setHistory(JSON.parse(h.value));
      const c=await storage.get('hah2_cat');   if(c)setCatalog(JSON.parse(c.value));
    }catch(e){}
    setLoading(false);
  })();},[]);

  const sv =useCallback(async s=>{setShift(s);  try{await storage.set('hah2_shift',JSON.stringify(s));}catch(e){}},[]);
  const svH=useCallback(async h=>{setHistory(h);try{await storage.set('hah2_hist',JSON.stringify(h));}catch(e){}},[]);
  const svC=useCallback(async c=>{setCatalog(c);try{await storage.set('hah2_cat',JSON.stringify(c));}catch(e){}},[]);

  const close=useCallback(async()=>{if(!shift)return;await svH([{...shift,closedAt:new Date().toISOString()},...history].slice(0,50));await sv(null);setTab('dash');},[shift,history,sv,svH]);

  if(loading)return (<div style={{background:'#0a0a0a',height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:18}}>Carregando...</div>);

      <div style={{background:'#000',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`2px solid ${R}`}}>
        <div><div style={{color:R,fontWeight:900,fontSize:20,letterSpacing:3}}>UMM</div><div style={{color:'#444',fontSize:9,letterSpacing:2,textTransform:'uppercase'}}>Controle Hora a Hora</div></div>

        {tab==='hist'   &&<Hist   history={history} catalog={catalog}/>}
      </div>
      <nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:680,background:'#141414',borderTop:'1px solid #222',display:'flex',zIndex:100}}>

// ─── EXPORT TO PLANILHA ──────────────────────────────────────────────────────
// Columns D-S map to cells C11,C13,...,C27
const CELL_COLS = {
  'C11':'D','C13':'E','C14':'F','C15':'G','C16':'H','C17':'I','C18':'J','C19':'K',
  'C20':'L','C21':'M','C22':'N','C23':'O','C24':'P','C25':'Q','C26':'R','C27':'S'
};

// REAL rows per shift: 3t=[19,21,23,25,27,29,31,33], same for 1t and 2t
const REAL_ROWS = [19,21,23,25,27,29,31,33];

function exportPlanilha(shift, catalog) {
  const wb = XLSX.utils.book_new();
  const sh = SHIFTS[shift.shiftKey];
  const mts = allMetas(shift, catalog);

  // Build sheet data as array of arrays (rows 1-40)
  // We'll create a flat data object: { "D6": value, "F10": value, ... }
  const data = {};
  const set = (col, row, val) => { data[`${col}${row}`] = val; };

  CELLS.forEach(c => {
    const col = CELL_COLS[c];
    const cell = shift.cells?.[c] || mkCell();

    // Row 6: Capacidade/hora
    const ch = capH(c, mts, shift.shiftKey);
    if (ch > 0) set(col, 6, ch);

    // Row 8: Operadores
    if (cell.operators) set(col, 8, Number(cell.operators));

    // Row 16: Extra refeição
    if (cell.extraRef && Number(cell.extraRef) > 0) set(col, 16, Number(cell.extraRef));

    // Parts: rows 10-15
    cell.parts?.forEach((p, i) => {
      const pRow = 10 + i * 2;      // 10, 12, 14
      const tRow = 10 + i * 2 + 1;  // 11, 13, 15
      if (p?.partId) set(col, pRow, p.partId);
      if (p?.startTime) set(col, tRow, p.startTime);
    });

    // REAL rows 19,21,23,25,27,29,31,33
    REAL_ROWS.forEach((row, pi) => {
      const r = shift.reals?.[c]?.[pi];
      if (r !== '' && r !== null && r !== undefined) set(col, row, Number(r));
    });
  });

  // Build the worksheet as aoa (array of arrays) rows 1-40
  const maxRow = 40;
  const cols = 'ABCDEFGHIJKLMNOPQRSTU'.split('');
  const aoa = [];
  for (let r = 1; r <= maxRow; r++) {
    const row = [];
    for (let ci = 0; ci < cols.length; ci++) {
      const key = `${cols[ci]}${r}`;
      row.push(data[key] !== undefined ? data[key] : null);
    }
    aoa.push(row);
  }

  // Add labels in col A
  const labels = {
    5: '📋 DISPONIBILIDADE', 6: '⚡ CAPACIDADE / HORA', 7: '🎯 META OEE 90%',
    8: '👤 Nº OPERADORES DL', 9: '📊 pç/HH (cap ÷ DL)',
    10: '🟢 PEÇA 1', 11: '⏰ INÍCIO 1', 12: '🟡 PEÇA 2', 13: '⏰ INÍCIO 2',
    14: '🔴 PEÇA 3', 15: '⏰ INÍCIO 3', 16: '⏱️ EXTRA REFEIÇÃO (min)',
  };
  Object.entries(labels).forEach(([r, lbl]) => { aoa[Number(r)-1][0] = lbl; });

  // Row 4: cell headers
  CELLS.forEach(c => { aoa[3][cols.indexOf(CELL_COLS[c])] = c; });

  // Period labels in col B + META row labels
  sh.periods.forEach((p, i) => {
    const mr = 18 + i * 2 - 1; // META rows: 17,19... → index 16,18...
    const rr = mr + 1;
    if (aoa[mr]) { aoa[mr][0] = 'META'; aoa[mr][1] = p.lbl; aoa[mr][2] = p.pm; }
    if (aoa[rr]) { aoa[rr][0] = 'REAL'; }
  });

  // Title rows
  aoa[0] = [`Controle Hora a Hora — ${sh.label} — ${shift.date}`];
  aoa[1] = [`Gerado pelo app UMM em ${new Date().toLocaleString('pt-BR')}`];

  const ws2 = XLSX.utils.aoa_to_sheet(aoa);
  const sheetName = sh.label.replace('°','').replace(' ','_');
  XLSX.utils.book_append_sheet(wb, ws2, sheetName);

  // Justificativas sheet
  const justRows = [['Período', 'Célula', 'Justificativa']];
  if (shift.justificativas) {
    Object.entries(shift.justificativas).forEach(([pi, cells]) => {
      Object.entries(cells).forEach(([c, txt]) => {
        if (txt) justRows.push([sh.periods[pi]?.lbl || `Período ${Number(pi)+1}`, c, txt]);
      });
    });
  }
  if (justRows.length > 1) {
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(justRows), 'Justificativas');
  }

  XLSX.writeFile(wb, `UMM_${sheetName}_${shift.date}.xlsx`);
}

                </div>
                {(below||(just[c]&&just[c].trim()))&&m>0&&(
                  <div style={{marginTop:8}}>
                    <div style={{color:below?'#ff9800':'#555',fontSize:10,fontWeight:700,marginBottom:4}}>
                      {below?'⚠️ Justificativa':'📝 Justificativa'}

                  </div>

          const pM=CELLS.reduce((s,c)=>s+(mts[c]?.[i]||0),0);

          const ch=capH(c,mts,shift.shiftKey);
          return(
            <button key={c} onClick={()=>open(c)} style={{background:'#141414',border:`1px solid ${ch>0?'#2a2a2a':'#1a1a1a'}`,borderRadius:12,padding:'14px',cursor:'pointer',textAlign:'left'}}>
              <div style={{color:'#fff',fontWeight:700,fontSize:15}}>{c}</div>
              {ch>0&&<div style={{color:R,fontSize:13,fontWeight:700,marginTop:2}}>{ch} pç/h</div>}
              <div style={{color:'#333',fontSize:10,marginTop:3}}>{cell.operators} op</div>
              {cell.parts[0]?.partId&&<div style={{color:'#2a2a2a',fontSize:10,marginTop:2}}>P1: {cell.parts[0].partId}</div>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function CatScreen({catalog,svC,onBack,fileRef,importExcel}){
  const[q,setQ]=useState('');
  const[nId,setNId]=useState('');
  const[nCaps,setNCaps]=useState(Object.fromEntries(CELLS.map(c=>[c,''])));
  const filtered=catalog.filter(e=>e.id.toLowerCase().includes(q.toLowerCase()));

  const add=()=>{
    if(!nId.trim())return;
    const caps={};CELLS.forEach(c=>{if(nCaps[c])caps[c]=Number(nCaps[c]);});
    svC([...catalog.filter(e=>e.id!==nId.trim()),{id:nId.trim(),caps}]);
    setNId('');setNCaps(Object.fromEntries(CELLS.map(c=>[c,''])));
  };

  return(
    <div style={{padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <button onClick={onBack} style={{background:'#252525',border:'none',color:'#fff',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:13}}>← Voltar</button>
        <div style={{color:'#fff',fontWeight:700,fontSize:16,flex:1}}>Catálogo de Peças</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={importExcel} style={{display:'none'}}/>
        <button onClick={()=>fileRef.current?.click()} style={{background:'#252525',border:'none',color:'#fff',borderRadius:8,padding:'8px 12px',cursor:'pointer',fontSize:12,fontWeight:600}}>📥 Importar Excel</button>
      </div>
      <Card style={{marginBottom:12}}>
        <Lbl>Adicionar Peça</Lbl>
        <input value={nId} onChange={e=>setNId(e.target.value)} style={iSt} placeholder="Nº da peça"/>
        <Lbl style={{marginTop:10}}>Capacidade por Célula</Lbl>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginTop:6}}>
          {CELLS.map(c=><div key={c} style={{display:'flex',flexDirection:'column',alignItems:'center'}}><span style={{color:'#444',fontSize:9,fontWeight:700}}>{c}</span><input type="number" value={nCaps[c]} onChange={e=>setNCaps(p=>({...p,[c]:e.target.value}))} style={{...iSt,padding:'6px 4px',fontSize:12,textAlign:'center',marginTop:2}} placeholder="–"/></div>)}
        </div>
        <button onClick={add} style={{...bSt,marginTop:12,width:'100%',background:R}}>➕ Adicionar</button>
      </Card>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder={`Buscar (${catalog.length} peças)...`} style={{...iSt,marginBottom:8}}/>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {filtered.slice(0,60).map(e=>(
          <div key={e.id} style={{background:'#141414',borderRadius:9,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{color:'#fff',fontWeight:700,fontSize:13}}>{e.id}</div><div style={{color:'#444',fontSize:10}}>{Object.entries(e.caps).map(([k,v])=>`${k}:${v}`).join(' · ')||'Sem cap.'}</div></div>
            <button onClick={()=>svC(catalog.filter(x=>x.id!==e.id))} style={{background:'none',border:'none',color:'#f44336',cursor:'pointer',fontSize:16,padding:4}}>🗑</button>
          </div>
        ))}
        {filtered.length>60&&<div style={{color:'#444',fontSize:11,textAlign:'center',padding:8}}>+{filtered.length-60} — use a busca</div>}
      </div>
    </div>
  );
}

function Hist({history,catalog}){
  const[view,setView]=useState('list'); // 'list' | 'detail' | 'log'
  const[sel,setSel]=useState(null);
  const[fCell,setFCell]=useState('');
  const[fShift,setFShift]=useState('');
  const[fPeriod,setFPeriod]=useState('');
  const[fMonth,setFMonth]=useState('');
  const[fYear,setFYear]=useState('');

  // Build flat records: one per cell × period × shift
  const allRecords=[];
  history.forEach((s,si)=>{
    const mts=allMetas(s,catalog);
    const sh=SHIFTS[s.shiftKey];
    const[yr,mo,dy]=s.date.split('-');
    sh.periods.forEach((p,pi)=>{
      CELLS.forEach(c=>{
        const m=(mts[c]||[])[pi]||0;
        const r=s.reals?.[c]?.[pi];
        const rv=r===''||r===undefined||r===null?null:Number(r);
        const ef=m>0&&rv!==null?rv/m:null;
        const just=s.justificativas?.[pi]?.[c]||'';
        if(m>0||rv!==null||just){
          allRecords.push({si,date:s.date,yr,mo,dy,shiftKey:s.shiftKey,shiftLbl:sh.label,
            pi,periodLbl:p.lbl,cell:c,meta:m,real:rv,efic:ef,just});
        }
      });
    });
  });

  // Available filter options
  const years=[...new Set(allRecords.map(r=>r.yr))].sort().reverse();
  const months=[...new Set(allRecords.map(r=>r.mo))].sort();

  // Apply filters
  const filtered=allRecords.filter(r=>{
    if(fCell&&r.cell!==fCell)return false;
    if(fShift&&r.shiftKey!==fShift)return false;
    if(fPeriod&&String(r.pi)!==fPeriod)return false;
    if(fMonth&&r.mo!==fMonth)return false;
    if(fYear&&r.yr!==fYear)return false;
    return true;
  });

  const exportExcel=()=>{
    const wb=XLSX.utils.book_new();
    // Resumo
    const res=[['Data','Turno','Meta Total','Real Total','Eficiência %','Saldo']];
    history.forEach(s=>{
      const mts=allMetas(s,catalog);
      const tM=CELLS.reduce((a,c)=>(mts[c]||[]).reduce((x,y)=>x+y,0)+a,0);
      const tR=CELLS.reduce((a,c)=>(s.reals?.[c]||[]).reduce((x,r)=>x+(r===''?0:Number(r)),0)+a,0);
      res.push([s.date,SHIFTS[s.shiftKey]?.label,tM,tR,tM>0?+((tR/tM*100).toFixed(1)):0,tR-tM]);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(res),'Resumo');
    // Log por célula
    const log=[['Data','Ano','Mês','Turno','Período','Célula','Meta','Real','Efic%','Justificativa']];
    allRecords.forEach(r=>{
      log.push([r.date,r.yr,r.mo,r.shiftLbl,r.periodLbl,r.cell,r.meta,r.real??'',
        r.efic!==null?+((r.efic*100).toFixed(1)):'',r.just]);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(log),'Log Células');
    XLSX.writeFile(wb,`UMM_HoraAHora_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  // Detail view of one shift
  if(view==='detail'&&sel!==null){
    const s=history[sel],mts=allMetas(s,catalog),sh=SHIFTS[s.shiftKey];
    const tM=CELLS.reduce((a,c)=>(mts[c]||[]).reduce((x,y)=>x+y,0)+a,0);
    const tR=CELLS.reduce((a,c)=>(s.reals?.[c]||[]).reduce((x,r)=>x+(r===''?0:Number(r)),0)+a,0);
    const ef=tM>0?tR/tM:null;
    return(
      <div style={{padding:16}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
          <button onClick={()=>{setView('list');setSel(null);}} style={{background:'#252525',border:'none',color:'#fff',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:13}}>← Voltar</button>
          <div><div style={{color:'#fff',fontWeight:700}}>{sh.label} · {s.date}</div>{ef!==null&&<div style={{color:sc(ef),fontSize:12,fontWeight:700}}>{(ef*100).toFixed(1)}%</div>}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
          <Stat lbl="Meta" val={tM.toLocaleString('pt-BR')}/>
          <Stat lbl="Real" val={tR.toLocaleString('pt-BR')} accent={R}/>
          <Stat lbl="Saldo" val={(tR-tM).toLocaleString('pt-BR',{signDisplay:'always'})} accent={tR>=tM?'#4caf50':'#f44336'}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5,marginBottom:14}}>
          {CELLS.map(c=>{
            const ef=eficTotal(c,mts,s.reals||{});
            const rT=(s.reals?.[c]||[]).reduce((a,r)=>a+(r===''?0:Number(r)),0);
            const mT=(mts[c]||[]).reduce((a,b)=>a+b,0);
            return (<div key={c} style={{background:sb(ef),borderRadius:9,padding:'9px 6px',border:`1px solid ${sc(ef)}`,textAlign:'center'}}><div style={{color:'#666',fontSize:10,fontWeight:700}}>{c}</div><div style={{color:'#fff',fontSize:13,fontWeight:800}}>{rT.toLocaleString()}</div><div style={{color:'#333',fontSize:8}}>/{mT.toLocaleString()}</div>{ef!==null&&<div style={{color:sc(ef),fontSize:10,fontWeight:700}}>{(ef*100).toFixed(0)}%</div>}</div>);
          })}
        </div>
        {/* Justificativas */}
        {s.justificativas&&Object.keys(s.justificativas).length>0&&(
          <div>
            <div style={{color:'#555',fontSize:11,fontWeight:700,letterSpacing:.5,textTransform:'uppercase',marginBottom:8}}>Justificativas</div>
            {Object.entries(s.justificativas).map(([pi,cells])=>(
              Object.entries(cells).map(([c,txt])=>(
                <div key={`${pi}-${c}`} style={{background:'#141414',borderRadius:8,padding:'10px 14px',marginBottom:6,borderLeft:'3px solid #ff9800'}}>
                  <div style={{display:'flex',gap:8,marginBottom:3}}>
                    <span style={{color:'#ff9800',fontSize:11,fontWeight:700}}>{sh.periods[pi]?.lbl}</span>
                    <span style={{color:'#555',fontSize:11}}>·</span>
                    <span style={{color:'#fff',fontSize:11,fontWeight:700}}>{c}</span>
                  </div>
                  <div style={{color:'#ccc',fontSize:13}}>{txt}</div>
                </div>
              ))
            ))}
          </div>
        )}
      </div>
    );
  }

  // Log view (filtered)
  if(view==='log') return(
    <div style={{padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
        <button onClick={()=>setView('list')} style={{background:'#252525',border:'none',color:'#fff',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:13}}>← Voltar</button>
        <div style={{color:'#fff',fontWeight:700,fontSize:16}}>Log por Célula</div>
        <button onClick={exportExcel} style={{marginLeft:'auto',background:'#276221',border:'none',color:'#fff',borderRadius:8,padding:'7px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>📥 Excel</button>
      </div>
      {/* Filters */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:12}}>
        {[
          ['Célula',fCell,setFCell,['',...CELLS].map(v=>({v,l:v||'Todas'}))],
          ['Turno',fShift,setFShift,[{v:'',l:'Todos'},{v:'3t',l:'3° Turno'},{v:'1t',l:'1° Turno'},{v:'2t',l:'2° Turno'}]],
          ['Período',fPeriod,setFPeriod,[{v:'',l:'Todos'},0,1,2,3,4,5,6,7].map((x,i)=>i===0?x:{v:String(x),l:`${x+1}ª hora`})],
          ['Mês',fMonth,setFMonth,[{v:'',l:'Todos'},...months.map(m=>({v:m,l:m}))]],
          ['Ano',fYear,setFYear,[{v:'',l:'Todos'},...years.map(y=>({v:y,l:y}))]],
          ['Turno tipo',fShift,setFShift,[{v:'',l:'Todos'},{v:'3t',l:'3°T'},{v:'1t',l:'1°T'},{v:'2t',l:'2°T'}]],
        ].slice(0,5).map(([lbl,val,setter,opts])=>(
          <div key={lbl}>
            <div style={{color:'#555',fontSize:10,fontWeight:700,marginBottom:3,textTransform:'uppercase'}}>{lbl}</div>
            <select value={val} onChange={e=>setter(e.target.value)}
              style={{width:'100%',background:'#161616',border:'1px solid #333',borderRadius:8,padding:'8px 10px',color:'#fff',fontSize:13,outline:'none'}}>
              {opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
            </select>
          </div>
        ))}
      </div>
      <div style={{color:'#444',fontSize:11,marginBottom:8}}>{filtered.length} registro(s)</div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.slice(0,100).map((r,i)=>(
          <div key={i} style={{background:'#141414',borderRadius:10,padding:'10px 14px',border:`1px solid ${r.efic!==null?sc(r.efic):'#222'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:r.just?6:0}}>
              <div>
                <span style={{color:'#fff',fontWeight:700,fontSize:13}}>{r.cell}</span>
                <span style={{color:'#444',fontSize:11,marginLeft:8}}>{r.date} · {r.shiftLbl}</span>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{color:r.efic!==null?sc(r.efic):'#444',fontWeight:700,fontSize:13}}>{r.real!==null?r.real.toLocaleString():'—'}<span style={{color:'#333',fontSize:10}}>/{r.meta}</span></div>
                {r.efic!==null&&<div style={{color:sc(r.efic),fontSize:10,fontWeight:700}}>{(r.efic*100).toFixed(0)}%</div>}
              </div>
            </div>
            <div style={{color:'#555',fontSize:10,marginBottom:r.just?4:0}}>{r.periodLbl}</div>
            {r.just&&<div style={{color:'#ff9800',fontSize:12,borderTop:'1px solid #222',paddingTop:6,marginTop:4}}>📝 {r.just}</div>}
          </div>
        ))}
        {filtered.length>100&&<div style={{color:'#444',fontSize:11,textAlign:'center',padding:8}}>Mostrando 100 de {filtered.length}. Refine os filtros.</div>}
      </div>
    </div>
  );

  // Main list view
  return(
    <div style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{color:'#fff',fontWeight:700,fontSize:18}}>Histórico</div>
        <div style={{display:'flex',gap:8}}>
          {history.length>0&&<button onClick={()=>setView('log')} style={{background:'#252525',border:'none',color:'#fff',borderRadius:8,padding:'8px 12px',cursor:'pointer',fontSize:12,fontWeight:600}}>🔍 Log</button>}
          {history.length>0&&<button onClick={exportExcel} style={{background:'#276221',border:'none',color:'#fff',borderRadius:8,padding:'8px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>📥 Excel</button>}
        </div>
      </div>
      {!history.length&&<div style={{color:'#444',textAlign:'center',marginTop:40,fontSize:15}}>Nenhum turno encerrado ainda.</div>}
      {history.map((s,i)=>{
        const mts=allMetas(s,catalog);
        const tM=CELLS.reduce((a,c)=>(mts[c]||[]).reduce((x,y)=>x+y,0)+a,0);
        const tR=CELLS.reduce((a,c)=>(s.reals?.[c]||[]).reduce((x,r)=>x+(r===''?0:Number(r)),0)+a,0);
        const ef=tM>0?tR/tM:null;
        const hasJust=s.justificativas&&Object.values(s.justificativas).some(pj=>Object.keys(pj).length>0);
        return (<button key={i} onClick={()=>{setSel(i);setView('detail');}} style={{display:'flex',alignItems:'center',gap:12,background:'#141414',border:'1px solid #1e1e1e',borderRadius:12,padding:'14px 16px',cursor:'pointer',textAlign:'left',width:'100%',marginBottom:8}}><div style={{flex:1}}><div style={{color:'#fff',fontWeight:700}}>{SHIFTS[s.shiftKey]?.label} · {s.date}</div><div style={{color:'#333',fontSize:11,marginTop:2}}>Meta:{tM.toLocaleString()} · Real:{tR.toLocaleString()}{hasJust?' · 📝':''}</div></div><div style={{textAlign:'right'}}><div style={{color:sc(ef),fontWeight:800,fontSize:16}}>{ef!==null?`${(ef*100).toFixed(1)}%`:'—'}</div><div style={{fontSize:14}}>{sl(ef)}</div></div></button>);
      })}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
